# /etc/coturn/turnserver.conf — argus TURN relay.
# Crypto-blind: relays opaque DTLS-SRTP only; never given media keys (security invariant 1).
# external-ip and static-auth-secret are injected at launch by docker-entrypoint.sh (CLI flags
# override these conf values so no IP or secret is hardcoded here).

# --- Listeners ---
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
realm=turn.4rgus.com
server-name=turn.4rgus.com
fingerprint

# --- Relay range (must match the NSG/SG rule in infra/azure/terraform + infra/aws/terraform) ---
min-port=49160
max-port=49260

# --- Auth: ephemeral REST/HMAC creds minted by apps/api. No static long-lived users. ---
use-auth-secret
no-auth-pings

# --- TLS for TURNS on 5349 (cert + key delivered from Key Vault as Docker secret files) ---
cert=/run/secrets/turn_tls_cert
pkey=/run/secrets/turn_tls_key
no-tlsv1
no-tlsv1_1
cipher-list=ECDHE+AESGCM:ECDHE+CHACHA20

# --- Abuse controls: deny relay to private/loopback ranges (SSRF-via-TURN prevention) ---
no-loopback-peers
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
max-bps=128000
total-quota=50
user-quota=6

# --- Logging: metadata-only, terse (see compose.prod.yaml local driver).
#     verbose and log-binding both default off in 4.6.x; no explicit negation needed.
#     STUN BIND messages (which carry peer IPs) are not logged by default. ---
log-file=stdout
simple-log

# --- No admin surface (security invariant 6: admin/ops exposes metadata only) ---
no-cli

# --- Prometheus metrics endpoint (binds to listening-ip; NSG/SG allows only 3478/5349/49160-49260) ---
prometheus

# --- Hygiene ---
stale-nonce=600
no-rfc5780
mobility
