# Grafana Tempo — distributed trace backend (monolithic mode, filesystem storage).
# Internal-only: no published host port; Grafana queries port 3200, the API sends OTLP to port 4318.
# usage_report disabled (same privacy posture as Loki and Prometheus).
# Threat model: docs/threat-models/structured-logging-and-tracing.md.

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

compactor:
  compaction:
    block_retention: 72h
  ring:
    kvstore:
      store: inmemory

query_frontend:
  search:
    default_result_limit: 20
