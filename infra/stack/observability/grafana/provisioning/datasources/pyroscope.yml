# Grafana Pyroscope datasource provisioning. Internal-only — Grafana queries pyroscope:4040 over
# the Docker network. No auth (same posture as Prometheus/Loki/Tempo — all internal).
apiVersion: 1
datasources:
  - name: Pyroscope
    uid: argus-pyroscope
    type: grafana-pyroscope-datasource
    access: proxy
    url: http://pyroscope:4040
    editable: false
