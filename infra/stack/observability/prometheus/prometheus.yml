# Prometheus config for the argus VM (checkpoint 47, Slice B). Scrapes the API's content-blind metrics
# endpoint over the INTERNAL Docker network (api:9090 — never published, never via Caddy; see
# docs/threat-models/observability.md). Prometheus + its data are internal-only; ops view them through Grafana
# (behind Cloudflare Access). NO secrets in this file.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: argus-prod

# Store exemplars (trace IDs attached to histogram observations). Grafana renders them as clickable
# dots on the p95 latency panel; clicking opens the Tempo trace for that exact request.
# Top-level stanza (not under global: — Prometheus rejects unknown keys there).
storage:
  exemplars:
    max_exemplars: 100000

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # The API exposes argus_api_* on its separate internal metrics port (Slice A). Content-blind: counts +
  # latencies + process stats only.
  - job_name: argus-api
    static_configs:
      - targets: ['api:9090']

  # Prometheus self-monitoring (its own /metrics).
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Infrastructure exporters (Track 3). No published ports — scraped over the internal Docker network.
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # coturn TURN relay — runs as network_mode:host, so Prometheus reaches it via host-gateway
  # (Docker resolves host.docker.internal → host IP via extra_hosts in compose.prod.yaml).
  # Port 9641 is not opened in the NSG; scraping is host-local only.
  - job_name: coturn
    static_configs:
      - targets: ['host.docker.internal:9641']
