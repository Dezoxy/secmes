# Alertmanager config. Routes alerts from Prometheus to a webhook receiver (Slack incoming webhook or any
# HTTP endpoint). The webhook URL is loaded from a mounted secret file — never hardcoded. The secret is
# OPTIONAL: an empty file (first boot, pre-arming) means notifications silently fail but alerts are still
# visible in the Alertmanager UI and Grafana. Arm by provisioning argus-alertmanager-webhook-url in Key
# Vault; Alertmanager hot-reloads via SIGHUP — no container restart needed.
#
# Whatever receiver is used MUST stay content-free: alert labels/annotations carry alert names, severity,
# and metric context only — never message content (invariant #2; see observability.md).
route:
  receiver: 'webhook'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # Webhook receiver — URL read from a Docker secret file at notification time (url_file, Alertmanager
  # >= 0.25.0). Empty file = no-op until the operator provisions argus-alertmanager-webhook-url in Key
  # Vault. send_resolved=true so recovery notifications also fire.
  - name: 'webhook'
    webhook_configs:
      - url_file: /run/secrets/alertmanager_webhook_url
        send_resolved: true

inhibit_rules:
  # A firing critical for an alertname silences the matching warning, to cut duplicate noise.
  - source_matchers: [severity = 'critical']
    target_matchers: [severity = 'warning']
    equal: ['alertname']
