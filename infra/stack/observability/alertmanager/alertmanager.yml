# Alertmanager armed config. Routes alerts from Prometheus to a webhook receiver (Slack incoming webhook or
# any HTTP endpoint). The webhook URL is loaded from a mounted secret file - never hardcoded. deploy.sh uses
# this config only when argus-alertmanager-webhook-url is non-empty; otherwise it stages
# alertmanager.unarmed.yml so unarmed first boot is quiet.
#
# Whatever receiver is used MUST stay content-free: alert labels/annotations carry alert names, severity,
# and metric context only — never message content (invariant #2; see observability.md).
route:
  receiver: 'webhook'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # Webhook receiver — URL read from a Docker secret file at notification time (url_file, Alertmanager
  # >= 0.25.0). send_resolved=true so recovery notifications also fire.
  - name: 'webhook'
    webhook_configs:
      - url_file: /run/secrets/alertmanager_webhook_url
        send_resolved: true

inhibit_rules:
  # A firing critical for an alertname silences the matching warning, to cut duplicate noise.
  - source_matchers: [severity = 'critical']
    target_matchers: [severity = 'warning']
    equal: ['alertname']
