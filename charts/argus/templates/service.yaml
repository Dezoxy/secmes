apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    {{- include "argus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.api.port }}
