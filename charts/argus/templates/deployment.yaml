{{- if and (not .Values.api.redisSecret.name) (or .Values.autoscaling.enabled (gt (int .Values.api.replicas) 1)) }}
{{- fail "Multi-pod (api.replicas > 1 or autoscaling.enabled) requires the Redis backplane: set api.redisSecret.name (checkpoint 29). Without it each pod has an isolated in-process bus and cross-pod real-time delivery breaks." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    {{- include "argus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}   # when autoscaling is enabled the HPA owns replicas (omit here)
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "argus.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: PORT
              value: "{{ .Values.api.port }}"
            - name: APP_VERSION
              value: "{{ .Values.api.image.tag }}"
            {{- if .Values.api.redisSecret.name }}
            # Redis connection string carries auth → injected from a Secret, never a plaintext value.
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.redisSecret.name }}
                  key: {{ .Values.api.redisSecret.key | default "redis-url" }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
