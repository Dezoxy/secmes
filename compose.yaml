name: argus-local

# Local dev stack — stands in for the managed Azure services. NOT for production.
# Credentials below are LOCAL-ONLY throwaway defaults, never real secrets.
#   postgres -> self-hosted Postgres | redis -> self-hosted Redis | minio -> Backblaze B2 (S3, prod)
# Start:  make up      Stop: make down      Wipe data: make reset

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_local_dev # local-only, not a secret
      POSTGRES_DB: argus
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argus -d argus']
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  # MinIO — S3-compatible object storage; local stand-in for the prod Backblaze B2 attachment bucket. The API
  # presigns S3 PUT/GET against it. LOCAL throwaway root creds, never real secrets. Private by default (no
  # anonymous access). The app NEVER creates the bucket (prod uses a bucket-scoped B2 key that can't); the
  # `minio-setup` one-shot below provisions the `argus-attachments` bucket idempotently.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin # local-only, not a secret
      MINIO_ROOT_PASSWORD: minioadmin # local-only, not a secret
      # The browser PUTs/GETs ciphertext directly to MinIO (cross-origin from the Vite dev server), so allow
      # CORS for local dev. Prod B2 needs an equivalent bucket CORS rule (see encrypted-attachments.md §5(f)).
      MINIO_API_CORS_ALLOW_ORIGIN: '*' # local dev only
    ports: ['9000:9000', '9001:9001'] # S3 API + web console
    volumes: ['miniodata:/data']

  # One-shot: wait for MinIO, then create the PRIVATE attachment bucket idempotently. Mirrors the prod B2
  # bucket (provisioned out-of-band) — the app's scoped key only ever does object read/write/delete.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo 'waiting for minio...'; sleep 1;
        done
        mc mb --ignore-existing local/argus-attachments
        mc anonymous set none local/argus-attachments
        echo 'minio bucket argus-attachments ready'

  # Dedicated Postgres for Zitadel — own volume so `make up` always inits cleanly and `make reset`
  # wipes it, isolated from the argus app DB. LOCAL creds only.
  zitadel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel_local_dev # local-only, not a secret
      POSTGRES_DB: zitadel
    volumes: ['zitadel-pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zitadel -d zitadel']
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: named volumes are created root-owned, but Zitadel runs as the non-root `zitadel` user
  # and must write its bootstrap PAT into /bootstrap. Make it writable before Zitadel starts.
  zitadel-bootstrap-perms:
    image: alpine:3.20
    command: ['sh', '-c', 'chmod 0777 /bootstrap']
    volumes: ['zitadel-bootstrap:/bootstrap']

  # Local OIDC provider — stands in for the VM's self-hosted Zitadel (checkpoint 9). `iss` host is `zitadel`
  # so it's identical for the in-compose API (compose DNS) and the browser — add `127.0.0.1 zitadel`
  # to /etc/hosts (docs/local-auth.md). All creds here are LOCAL throwaways, never real secrets.
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.0
    restart: unless-stopped
    command: 'start-from-init --masterkeyFromEnv --tlsMode disabled --steps /init-steps.yaml'
    environment:
      ZITADEL_MASTERKEY: 'argusLocalDevMasterKey0123456789' # local-only; must be exactly 32 chars
      ZITADEL_PORT: '8080'
      ZITADEL_EXTERNALDOMAIN: zitadel
      ZITADEL_EXTERNALPORT: '8080'
      ZITADEL_EXTERNALSECURE: 'false'
      ZITADEL_TLS_ENABLED: 'false'
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: '5432'
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel_user
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_local_dev # local-only
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel_local_dev # local-only (superuser of zitadel-db)
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    volumes:
      - './infra/local/zitadel/init-steps.yaml:/init-steps.yaml:ro'
      - 'zitadel-bootstrap:/bootstrap'
    ports: ['8080:8080']
    depends_on:
      zitadel-db:
        condition: service_healthy
      zitadel-bootstrap-perms:
        condition: service_completed_successfully

  # Zitadel v4's hosted Login V2 UI is a separate app from the identity server. The main `zitadel`
  # container handles OIDC/API/JWKS; this container renders the browser login screens. It reads the
  # local IAM_LOGIN_CLIENT PAT from the shared volume (local throwaway, never committed) and talks to the
  # API over the compose network. Exposed on host :3001 so browsers can reach http://zitadel:3001.
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.15.0
    restart: unless-stopped
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      ZITADEL_SERVICE_USER_TOKEN_FILE: /bootstrap/login-client.pat
    volumes:
      - 'zitadel-bootstrap:/bootstrap:ro'
    ports: ['3001:3000']
    depends_on:
      zitadel:
        condition: service_started

  # One-shot provisioner — run by `make up`, profiled out of a bare `docker compose up`. Creates the
  # project, the SPA OIDC app, and the tenant-claim Action via the bootstrap PAT, then writes the
  # generated ids to the shared volume for the Makefile to place in .env.local. Idempotent.
  zitadel-provision:
    image: alpine:3.20
    profiles: ['tools']
    depends_on:
      zitadel:
        condition: service_started
    volumes:
      - './infra/local/zitadel:/scripts:ro'
      - 'zitadel-bootstrap:/bootstrap'
    entrypoint: ['sh', '-c', 'apk add --no-cache curl jq >/dev/null && sh /scripts/provision.sh']

  # The api image is a workspace-aware build (repo-root context — the Dockerfile pulls in @argus/crypto via
  # the pnpm workspace). `make up` keeps it out of a bare `docker compose up` via `profiles: [app]` (for the
  # hot-reload host workflow, run `make api-dev`); start it in a container with
  # `docker compose --profile app up --build api`.
  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development # enables Swagger UI at /docs locally
      PORT: '3000'
      # Wired now, consumed from Phase 1 onward:
      DATABASE_URL: postgres://argus:argus_local_dev@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: argus-attachments
      S3_ACCESS_KEY_ID: minioadmin # local-only, not a secret
      S3_SECRET_ACCESS_KEY: minioadmin # local-only, not a secret
      S3_FORCE_PATH_STYLE: 'true' # MinIO needs path-style; B2 uses virtual-host
    # OIDC config (non-secret issuer/audience/tenant-claim) is generated per-instance by
    # `zitadel-provision` and materialised to .env.local by `make up`. Absent it, the API boots and
    # health works but protected routes fail closed with 401 — never silently unauthenticated.
    env_file:
      - path: .env.local
        required: false
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/healthz || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
  miniodata:
  zitadel-pgdata:
  zitadel-bootstrap:
