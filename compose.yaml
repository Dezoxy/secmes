name: argus-local

# Local dev stack — stands in for the managed Azure services. NOT for production.
# Credentials below are LOCAL-ONLY throwaway defaults, never real secrets.
#   postgres -> self-hosted Postgres | redis -> self-hosted Redis | minio -> Backblaze B2 (S3, prod)
# Start:  make up      Stop: make down      Wipe data: make reset

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_local_dev # local-only, not a secret
      POSTGRES_DB: argus
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argus -d argus']
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:8-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  # MinIO — S3-compatible object storage; local stand-in for the prod Backblaze B2 attachment bucket. The API
  # presigns S3 PUT/GET against it. LOCAL throwaway root creds, never real secrets. Private by default (no
  # anonymous access). The app NEVER creates the bucket (prod uses a bucket-scoped B2 key that can't); the
  # `minio-setup` one-shot below provisions the `argus-attachments` bucket idempotently.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin # local-only, not a secret
      MINIO_ROOT_PASSWORD: minioadmin # local-only, not a secret
      # The browser PUTs/GETs ciphertext directly to MinIO (cross-origin from the Vite dev server), so allow
      # CORS for local dev. Prod B2 needs an equivalent bucket CORS rule (see encrypted-attachments.md §5(f)).
      MINIO_API_CORS_ALLOW_ORIGIN: '*' # local dev only
    ports: ['9000:9000', '9001:9001'] # S3 API + web console
    volumes: ['miniodata:/data']

  # One-shot: wait for MinIO, then create the PRIVATE attachment bucket idempotently. Mirrors the prod B2
  # bucket (provisioned out-of-band) — the app's scoped key only ever does object read/write/delete.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo 'waiting for minio...'; sleep 1;
        done
        mc mb --ignore-existing local/argus-attachments
        mc anonymous set none local/argus-attachments
        echo 'minio bucket argus-attachments ready'

  # The api image is a workspace-aware build (repo-root context — the Dockerfile pulls in @argus/crypto via
  # the pnpm workspace). `make up` keeps it out of a bare `docker compose up` via `profiles: [app]` (for the
  # hot-reload host workflow, run `make api-dev`); start it in a container with
  # `docker compose --profile app up --build api`.
  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development # enables Swagger UI at /docs locally
      PORT: '3000'
      # Wired now, consumed from Phase 1 onward:
      DATABASE_URL: postgres://argus:argus_local_dev@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: argus-attachments
      S3_ACCESS_KEY_ID: minioadmin # local-only, not a secret
      S3_SECRET_ACCESS_KEY: minioadmin # local-only, not a secret
      S3_FORCE_PATH_STYLE: 'true' # MinIO needs path-style; B2 uses virtual-host
      # Auth is passkey-only (the API mints its own EdDSA session tokens). WEBAUTHN_RP_ID defaults to
      # 'localhost' and SESSION_SIGNING_KEY_FILE is unset in dev → an ephemeral dev keypair is generated
      # (see session-key.config.ts). See docs/local-auth.md for the demo-mode / seeded-invite dev flow.
    # Optional local overrides (gitignored). Not required — the dev defaults above are sufficient.
    env_file:
      - path: .env.local
        required: false
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/healthz || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
  miniodata:
