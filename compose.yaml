name: argus-local

# Local dev stack — stands in for the managed Azure services. NOT for production.
# Credentials below are LOCAL-ONLY throwaway defaults, never real secrets.
#   postgres -> Azure DB for PostgreSQL | redis -> Azure Cache | minio -> Azure Blob
# Start:  make up      Stop: make down      Wipe data: make reset

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus_local_dev # local-only, not a secret
      POSTGRES_DB: argus
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argus -d argus']
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: argus
      MINIO_ROOT_PASSWORD: argus_local_dev # local-only, not a secret
    ports: ['9000:9000', '9001:9001'] # API + web console
    volumes: ['miniodata:/data']

  # One-shot: create the attachments bucket, then exit.
  createbuckets:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 argus argus_local_dev; do echo 'waiting for minio'; sleep 1; done &&
      mc mb -p local/argus-attachments &&
      mc anonymous set none local/argus-attachments &&
      echo 'bucket ready'
      "

  # Dedicated Postgres for Zitadel — own volume so `make up` always inits cleanly and `make reset`
  # wipes it, isolated from the argus app DB. LOCAL creds only.
  zitadel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: zitadel_local_dev # local-only, not a secret
      POSTGRES_DB: zitadel
    volumes: ['zitadel-pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zitadel -d zitadel']
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: named volumes are created root-owned, but Zitadel runs as the non-root `zitadel` user
  # and must write its bootstrap PAT into /bootstrap. Make it writable before Zitadel starts.
  zitadel-bootstrap-perms:
    image: alpine:3.20
    command: ['sh', '-c', 'chmod 0777 /bootstrap']
    volumes: ['zitadel-bootstrap:/bootstrap']

  # Local OIDC provider — stands in for managed Zitadel-on-AKS (checkpoint 9). `iss` host is `zitadel`
  # so it's identical for the in-compose API (compose DNS) and the browser — add `127.0.0.1 zitadel`
  # to /etc/hosts (docs/local-auth.md). All creds here are LOCAL throwaways, never real secrets.
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.0
    restart: unless-stopped
    command: 'start-from-init --masterkeyFromEnv --tlsMode disabled --steps /init-steps.yaml'
    environment:
      ZITADEL_MASTERKEY: 'argusLocalDevMasterKey0123456789' # local-only; must be exactly 32 chars
      ZITADEL_PORT: '8080'
      ZITADEL_EXTERNALDOMAIN: zitadel
      ZITADEL_EXTERNALPORT: '8080'
      ZITADEL_EXTERNALSECURE: 'false'
      ZITADEL_TLS_ENABLED: 'false'
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: '5432'
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel_user
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_local_dev # local-only
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel_local_dev # local-only (superuser of zitadel-db)
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
    volumes:
      - './infra/local/zitadel/init-steps.yaml:/init-steps.yaml:ro'
      - 'zitadel-bootstrap:/bootstrap'
    ports: ['8080:8080']
    depends_on:
      zitadel-db:
        condition: service_healthy
      zitadel-bootstrap-perms:
        condition: service_completed_successfully

  # Zitadel v4's hosted Login V2 UI is a separate app from the identity server. The main `zitadel`
  # container handles OIDC/API/JWKS; this container renders the browser login screens. It reads the
  # local bootstrap PAT from the shared volume (local throwaway, never committed) and talks to the
  # API over the compose network. Exposed on host :3001 so browsers can reach http://zitadel:3001.
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.15.0
    restart: unless-stopped
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      ZITADEL_SERVICE_USER_TOKEN_FILE: /bootstrap/admin.pat
    volumes:
      - 'zitadel-bootstrap:/bootstrap:ro'
    ports: ['3001:3000']
    depends_on:
      zitadel:
        condition: service_started

  # One-shot provisioner — run by `make up`, profiled out of a bare `docker compose up`. Creates the
  # project, the SPA OIDC app, and the tenant-claim Action via the bootstrap PAT, then writes the
  # generated ids to the shared volume for the Makefile to place in .env.local. Idempotent.
  zitadel-provision:
    image: alpine:3.20
    profiles: ['tools']
    depends_on:
      zitadel:
        condition: service_started
    volumes:
      - './infra/local/zitadel:/scripts:ro'
      - 'zitadel-bootstrap:/bootstrap'
    entrypoint: ['sh', '-c', 'apk add --no-cache curl jq >/dev/null && sh /scripts/provision.sh']

  # NOTE: this image build is currently broken (the self-contained Dockerfile does `npm install`
  # without a lockfile → drizzle-orm drifts to a version with non-compiling .d.ts; see the Dockerfile
  # TODO). `make up` therefore does NOT build the API — run it on the host with `make api-dev`. The
  # service + env_file stay defined for when the build is reworked to the pnpm workspace.
  # `profiles: [app]` keeps the broken build out of a bare `docker compose up` — start it explicitly
  # (`docker compose --profile app up api`) once the Dockerfile is fixed.
  api:
    profiles: ['app']
    build:
      context: ./apps/api
    environment:
      NODE_ENV: development # enables Swagger UI at /docs locally
      PORT: '3000'
      # Wired now, consumed from Phase 1 onward:
      DATABASE_URL: postgres://argus:argus_local_dev@postgres:5432/argus
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: argus-attachments
      S3_ACCESS_KEY: argus
      S3_SECRET_KEY: argus_local_dev
    # OIDC config (non-secret issuer/audience/tenant-claim) is generated per-instance by
    # `zitadel-provision` and materialised to .env.local by `make up`. Absent it, the API boots and
    # health works but protected routes fail closed with 401 — never silently unauthenticated.
    env_file:
      - path: .env.local
        required: false
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/healthz || exit 1']
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
  miniodata:
  zitadel-pgdata:
  zitadel-bootstrap:
