<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- No maximum-scale here: it would disable pinch-zoom for everyone (a11y). main.tsx adds
         maximum-scale=1 ONLY when running as an installed standalone PWA, where it stops the
         iOS keyboard-focus zoom while preserving pinch-zoom in a normal browser tab. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="argus is a privacy-first, end-to-end-encrypted messaging PWA."
    />
    <meta name="application-name" content="argus" />
    <meta name="apple-mobile-web-app-title" content="argus" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f0f16" />
    <title>argus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
