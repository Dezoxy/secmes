version: 2

updates:
  # JavaScript / TypeScript — pnpm workspace (root lockfile + each package.json)
  # Single root entry — the pnpm workspace has ONE lockfile, so this covers all
  # packages and avoids duplicate per-directory PRs.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 8
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(dev-deps)'
    groups:
      # Bundle low-risk bumps into one PR; majors still come individually.
      npm-minor-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']

  # Pinned action versions in .github/workflows/*
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    labels: ['dependencies']
    commit-message:
      prefix: 'ci(deps)'
    groups:
      github-actions:
        patterns: ['*']

  # Terraform providers/modules (azurerm)
  - package-ecosystem: 'terraform'
    directory: '/infra/azure/terraform'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(infra-deps)'

  # Container base image (apps/api/Dockerfile)
  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(docker-deps)'

  # Production ingress image base layers (infra/stack/caddy/Dockerfile: node + caddy)
  - package-ecosystem: 'docker'
    directory: '/infra/stack/caddy'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    labels: ['dependencies']
    commit-message:
      prefix: 'chore(docker-deps)'
