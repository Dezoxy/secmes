name: dast
# Dynamic (DAST) scans. The OWASP ZAP baseline runs against the deployed staging API (vars.STAGING_URL).
# The 42Crunch conformance scan is SELF-HOSTED: it boots the API + Postgres + Redis in the runner and
# scans localhost via 42Crunch's free (freemium) DAST endpoint — no staging deployment or paid token needed.
on:
  schedule:
    - cron: '0 2 * * *' # nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ vars.STAGING_URL }}

  # Self-hosted conformance/DAST scan: boot the API + Postgres + Redis here and scan localhost with
  # 42Crunch's freemium DAST action (free stateless endpoint — no paid token). The API is crypto-blind
  # and boots fine without OIDC/S3 (protected routes 401, attachment routes 503), which is fine for
  # surface/conformance scanning. Nightly cadence keeps within the freemium usage limits.
  api-conformance-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        # CI-throwaway DB: trust auth → no password literal. `argus` is the service superuser; app code
        # drops to the non-bypass `argus_app` role per transaction.
        env:
          POSTGRES_USER: argus
          POSTGRES_DB: argus
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build API + workspace deps
        run: pnpm --filter @argus/api... build

      # DB env is scoped to the steps that need it (migrate + the API server) — NOT job-level — so the
      # "Generate OpenAPI spec" step runs WITHOUT DATABASE_URL. With it, the generator's Nest app opens a
      # module-level Postgres pool that app.close() doesn't own, so it hangs after writing the file.
      - name: Apply DB migrations
        env:
          DATABASE_URL: postgres://argus@localhost:5432/argus
        run: pnpm --filter @argus/api db:migrate

      - name: Generate OpenAPI spec
        run: pnpm --filter @argus/api openapi

      - name: Start the API and wait for /healthz
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://argus@localhost:5432/argus
          REDIS_URL: redis://localhost:6379
          PORT: '3000'
        run: |
          set -euo pipefail
          node dist/main.js &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/healthz >/dev/null 2>&1; then
              echo "API is healthy"; exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy in time"; exit 1

      - name: 42Crunch freemium DAST conformance scan
        uses: 42Crunch/api-security-scan-action-freemium@82a6d09a7f4565a5964b386c3399b85ac2fb5a17 # v1.4
        with:
          target-url: http://localhost:3000
          api-definition: apps/api/openapi.json
          # SARIF/Code-Scanning upload is OFF: the freemium action's SARIF KDB conversion is unreliable
          # (crashes in build_scan_kdb). Capture the scan report as a build artifact for review instead.
          upload-to-code-scanning: false
          scan-report: scan-report.json
          log-level: info

      - name: Upload DAST scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dast-scan-report
          path: scan-report.json
          if-no-files-found: ignore
