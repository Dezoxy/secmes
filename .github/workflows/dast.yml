name: dast
# Dynamic scans against the deployed staging API. Verify action versions + config before first run.
# Vars: STAGING_URL. Secrets: X42C_API_TOKEN. Requires a reachable staging deployment.
on:
  schedule:
    - cron: '0 2 * * *' # nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: OWASP ZAP baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ vars.STAGING_URL }}

  api-conformance-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm --filter @argus/api openapi
      - name: 42Crunch Conformance Scan
        uses: 42Crunch/api-security-scan-action@v1
        with:
          api-token: ${{ secrets.X42C_API_TOKEN }}
          target-url: ${{ vars.STAGING_URL }}
          log-level: info
