name: security
# Layer-1 security gate. Verify third-party action versions + required secrets before first run.
# Secrets needed: X42C_API_TOKEN (42Crunch). OSS scanners need no token.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # weekly deep sweep

permissions:
  contents: read
  security-events: write

jobs:
  sast-semgrep:
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep (custom secmes rules + registry auto)
        run: semgrep scan --config .semgrep --config auto --error --quiet

  deps-osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: OSV-Scanner (dependency CVEs)
        # Known transitive CVEs are allow-listed with reasons + expiry in osv-scanner.toml.
        # NEW or unlisted vulnerabilities still fail this job.
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=./pnpm-lock.yaml

  # (Trivy fs scan removed: redundant with OSV for deps and Checkov for IaC.
  #  Trivy's unique value is container-IMAGE scanning, which belongs in cd.yml.)

  secrets-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac-checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@v12
        with:
          config_file: .checkov.yaml

  k8s-kubescape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Kubescape (NSA + MITRE posture on charts)
        uses: kubescape/github-action@main
        with:
          files: 'charts/'
          frameworks: 'nsa,mitre'

  api-42crunch-audit:
    # Enable by setting repo variable ENABLE_42CRUNCH=true after adding the X42C_API_TOKEN secret.
    if: ${{ vars.ENABLE_42CRUNCH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm --filter @secmes/api openapi
      - name: 42Crunch API Security Audit
        uses: 42Crunch/api-security-audit-action@v4
        with:
          api-token: ${{ secrets.X42C_API_TOKEN }}
          min-score: 75
          log-level: info
