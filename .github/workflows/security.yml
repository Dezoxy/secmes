name: security
# Layer-1 security gate. Verify third-party action versions + required secrets before first run.
# Secrets needed: X42C_API_TOKEN (42Crunch). OSS scanners need no token.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # weekly deep sweep

permissions:
  contents: read
  security-events: write

jobs:
  sast-semgrep:
    runs-on: ubuntu-latest
    # SUP-1: digest-pinned (was untagged = :latest). See docs/threat-models/supply-chain-ci.md.
    container: semgrep/semgrep@sha256:c180f0c93a17b420c0af5006214a29d3c747c5459c732b740191adf657dd0068
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Semgrep (custom argus rules + registry auto)
        run: semgrep scan --config .semgrep --config auto --error --quiet

  deps-osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: OSV-Scanner (dependency CVEs)
        # Known transitive CVEs are allow-listed with reasons + expiry in osv-scanner.toml.
        # NEW or unlisted vulnerabilities still fail this job.
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=./pnpm-lock.yaml

  # (Trivy fs scan removed: redundant with OSV for deps and Checkov for IaC.
  #  Trivy's unique value is container-IMAGE scanning, which belongs in cd.yml.)

  secrets-gitleaks:
    runs-on: ubuntu-latest
    # gitleaks-action's ScanPullRequest lists the PR's commits via GET /repos/.../pulls/{n}/commits.
    # On a PRIVATE repo that endpoint needs `pull-requests: read` — public repos returned it under the
    # default token, so this only started 403'ing ("Resource not accessible by integration") once the repo
    # went private. Job-level perms override the workflow default (contents+security-events) for least privilege.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac-checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          config_file: .checkov.yaml

  api-42crunch-audit:
    # Enable by setting repo variable ENABLE_42CRUNCH=true after adding the X42C_API_TOKEN secret.
    if: ${{ vars.ENABLE_42CRUNCH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate OpenAPI spec
        run: pnpm --filter @argus/api openapi
      - name: 42Crunch API Security Audit
        uses: 42Crunch/api-security-audit-action@c675c3d41a7932c89d166717572e5c243afaa54d # v4
        with:
          api-token: ${{ secrets.X42C_API_TOKEN }}
          min-score: 75
          log-level: info
