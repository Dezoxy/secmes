name: claude

# Manual, MENTION-TRIGGERED ONLY: Claude responds when a maintainer comments `@claude` on a PR or issue.
# This is deliberately NOT an automatic review on PR open — Claude is a FALLBACK for when the primary code
# reviewer (the Codex connector) is unavailable. The primary merge gate stays CI + Codex (see AGENTS.md).
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

# Least privilege: read the repo + CI results; post the review comment. NO contents:write — Claude must not
# push commits from a mention. id-token is for the action's OIDC token exchange.
permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  id-token: write

# One in-flight run per PR/issue; don't cancel a review that's already running.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Two gates, both required:
    #   1. the trigger phrase `@claude` is actually present (don't burn a run on every comment), AND
    #   2. the actor is the repo OWNER. This repo is PUBLIC — without the owner check, ANY GitHub user could
    #      comment `@claude` and burn the owner's OAuth-token-billed Claude subscription usage. Broaden to
    #      MEMBER / COLLABORATOR (via *.author_association) if the repo ever gains a team.
    if: >-
      github.actor == github.repository_owner &&
      (contains(github.event.comment.body, '@claude') ||
       contains(github.event.review.body, '@claude') ||
       contains(github.event.issue.body, '@claude') ||
       contains(github.event.issue.title, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      # When triggered by a PR comment (`issue_comment`), actions/checkout lands on the default branch
      # (main). The claude-code-action runs `git hash-object <path>` for every file in the PR diff, which
      # fails for files that are NEW in the PR (they don't exist in main's working tree). Fetching and
      # checking out the PR head puts all those files in place before the action runs.
      # Safe: the `github.actor == github.repository_owner` gate above prevents arbitrary users from
      # triggering code from their own PRs in this context.
      - name: Checkout PR head (when triggered from a PR comment)
        if: github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          git fetch --depth=1 origin "$PR_HEAD_SHA"
          git checkout "$PR_HEAD_SHA"

      - uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
