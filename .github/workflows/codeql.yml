name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    # Code scanning / SARIF upload needs GitHub Advanced Security, which is unavailable on a user-owned
    # PRIVATE repo (and not included in Pro). Skip on private so it doesn't fail every run; this auto-revives
    # if the repo is ever made public again. Semgrep/OSV/Trivy/gitleaks still cover SAST/deps/secrets.
    if: ${{ github.event.repository.visibility == 'public' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
