name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm -r build

      - name: Generate OpenAPI spec
        run: pnpm --filter @argus/api openapi

      - uses: actions/upload-artifact@v7
        with:
          name: openapi
          path: apps/api/openapi.json

  # Behavioral gate: Playwright drives the real app in a browser, so a green run means the
  # product works as a user would see it — not just that units pass. (playwright.config.ts
  # boots the Vite dev server itself; no API/DB needed.)
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web + workspace deps
        run: pnpm --filter @argus/web... build

      - name: Install Playwright Chromium
        run: pnpm --filter @argus/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @argus/web test:e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # Invariant #3 guard: the prod stack must publish NO host ports — cloudflared's outbound tunnel is the only
  # ingress, and every data service (postgres/redis/api/zitadel*/prometheus/grafana/alertmanager) stays on the
  # internal Docker network. A stray `ports:` mapping (e.g. exposing redis or /metrics) would breach it; this
  # fails the build mechanically (see docs/threat-models/observability.md + vm-ingress.md).
  compose-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Assert compose.prod.yaml publishes no host ports
        run: |
          set -euo pipefail
          published=$(docker compose -f compose.prod.yaml config --format json \
            | jq '[.services[].ports // []] | add // [] | length')
          if [ "$published" -ne 0 ]; then
            echo "::error::compose.prod.yaml publishes $published host port mapping(s) — invariant #3: data services must stay internal (cloudflared is the only ingress)."
            docker compose -f compose.prod.yaml config --format json \
              | jq -r '.services | to_entries[] | select((.value.ports // []) | length > 0) | "  offending service: \(.key)"'
            exit 1
          fi
          echo "compose.prod.yaml: no published host ports OK"

  dockerignore-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Assert the secret-exclude block is identical across all *dockerignore
        run: bash scripts/check-dockerignore-secret-sync.sh
