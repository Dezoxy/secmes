name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    # Postgres + Redis so the @argus/api DB-integration suite (RLS, audit append-only, fail-closed
    # carve-outs, breakglass) actually RUNS in CI instead of auto-skipping. Without DATABASE_URL these
    # tests skip via describe.skipIf(!DATABASE_URL) — a gap that let tenant-isolation tests drift.
    services:
      postgres:
        image: postgres:16-alpine
        # CI-throwaway local DB: trust auth → no password literal to commit. `argus` is the service
        # superuser; the app code drops to the non-bypass `argus_app` role per transaction.
        env:
          POSTGRES_USER: argus
          POSTGRES_DB: argus
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argus -d argus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm -r typecheck

      # Apply the schema before tests. DB env is scoped to the steps that need it (migrate + test) —
      # NOT job-level — so the "Generate OpenAPI spec" step below runs WITHOUT DATABASE_URL. With it,
      # bootstrapping the Nest app opens a module-level Postgres pool that app.close() doesn't own, so
      # the generator would write openapi.json and then hang on the leaked handle.
      - name: Apply DB migrations
        env:
          DATABASE_URL: postgres://argus@localhost:5432/argus
        run: pnpm --filter @argus/api db:migrate

      - name: Run tests
        env:
          DATABASE_URL: postgres://argus@localhost:5432/argus
          REDIS_URL: redis://localhost:6379
        run: pnpm -r test

      - run: pnpm -r build

      - name: Generate OpenAPI spec
        run: pnpm --filter @argus/api openapi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openapi
          path: apps/api/openapi.json

  # Behavioral gate: Playwright drives the real app in a browser, so a green run means the
  # product works as a user would see it — not just that units pass. (playwright.config.ts
  # boots the Vite dev server itself; no API/DB needed.)
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web + workspace deps
        run: pnpm --filter @argus/web... build

      - name: Install Playwright Chromium
        run: pnpm --filter @argus/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @argus/web test:e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # Invariant #3 guard: the prod stack must publish NO host ports — cloudflared's outbound tunnel is the only
  # ingress, and every data service (postgres/redis/api/zitadel*/prometheus/grafana/alertmanager) stays on the
  # internal Docker network. A stray `ports:` mapping (e.g. exposing redis or /metrics) would breach it; this
  # fails the build mechanically (see docs/threat-models/observability.md + vm-ingress.md).
  compose-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Assert compose.prod.yaml publishes no host ports
        run: |
          set -euo pipefail
          published=$(docker compose -f compose.prod.yaml config --format json \
            | jq '[.services[].ports // []] | add // [] | length')
          if [ "$published" -ne 0 ]; then
            echo "::error::compose.prod.yaml publishes $published host port mapping(s) — invariant #3: data services must stay internal (cloudflared is the only ingress)."
            docker compose -f compose.prod.yaml config --format json \
              | jq -r '.services | to_entries[] | select((.value.ports // []) | length > 0) | "  offending service: \(.key)"'
            exit 1
          fi
          echo "compose.prod.yaml: no published host ports OK"

  dockerignore-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Assert the secret-exclude block is identical across all *dockerignore
        run: bash scripts/check-dockerignore-secret-sync.sh
