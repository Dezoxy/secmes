name: cd

# Release-on-tag: a maintainer pushes a semver tag (e.g. v1.4.0) to cut a release. The version IS the image
# tag, so the deployed artifact is traceable to the git tag. PR validation (lint/test/build) lives in ci.yml;
# this workflow only builds the release artifact + (gated) rolls it out.
on:
  push:
    tags: ['v*.*.*']

# Least privilege. id-token: Azure OIDC (no stored cloud creds) + cosign keyless signing.
# packages: write to push the images to GHCR. No contents:write (the VM rollout is run-command, not GitOps).
permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # The release version is the image tag. github.ref_name on a tag push is the tag name (e.g. v1.4.0) —
  # trusted (a maintainer pushed it), and the VM pulls exactly this version.
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  # Build, scan, SBOM, and keyless-sign both images (api + the Caddy ingress that bakes the PWA), push to GHCR.
  images:
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            context: . # repo root — the api build needs the pnpm workspace (@argus/crypto)
            dockerfile: apps/api/Dockerfile
          - name: ingress
            context: .
            dockerfile: infra/stack/caddy/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # full history + tags for the About release-notes generator

      - name: Resolve image ref (lowercase owner — GHCR requires it)
        env:
          OWNER: ${{ github.repository_owner }}
          NAME: ${{ matrix.name }}
        run: |
          REPO_PATH="${REGISTRY}/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/argus-${NAME}"
          echo "IMAGE=${REPO_PATH}:${IMAGE_TAG}" >>"$GITHUB_ENV"
          # Durable per-image build cache (registry, not GHA — releases are infrequent so GHA's ~7d eviction
          # would leave every release cold). Lets an UNCHANGED image reuse identical layer digests → the VM's
          # `docker pull` is an "already exists" no-op (a frontend-only release doesn't re-pull the api).
          echo "CACHE=${REPO_PATH}:buildcache" >>"$GITHUB_ENV"

      - name: GHCR login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate the About changelog from git tags + commits (ingress bakes the PWA). Runs here in the runner
      # job because the Docker build context excludes .git; the emitted .ts then rides into the build context.
      - name: Generate About release notes
        if: matrix.name == 'ingress'
        env:
          RELEASE_TAG: ${{ env.IMAGE_TAG }} # scope the changelog to this tag's namespace (prod v*)
        run: node apps/web/scripts/gen-release-notes.mjs

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE }}
          # The PWA About version follows the release tag (IMAGE_TAG = github.ref_name); the api image ignores it.
          build-args: |
            VITE_APP_VERSION=${{ env.IMAGE_TAG }}
          # Reuse unchanged layers across releases (mode=max also caches the multi-stage build layers). Paired
          # with each image's per-Dockerfile .dockerignore (which excludes the OTHER app's source), a change to
          # one app keeps the other image's layers cache-stable → identical digests → no VM re-download.
          cache-from: type=registry,ref=${{ env.CACHE }}
          cache-to: type=registry,ref=${{ env.CACHE }},mode=max

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image + attest SBOM (keyless via OIDC)
        run: |
          cosign sign --yes "$IMAGE"
          cosign attest --yes --predicate "sbom-${{ matrix.name }}.spdx.json" --type spdxjson "$IMAGE"

  # Roll out to the single VM through the Azure control plane (no SSH, no open port). Gated; runs only after
  # both images are built + signed. The exact-SHA infra files are bundled INTO the run-command, so the VM
  # token stays pull-only (it can't read the repo). The VM pulls the signed images + migrates before serving.
  deploy:
    needs: images
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    # Serialize rollouts to the SINGLE VM: a constant group (not per-ref) means two releases pushed close
    # together queue instead of running `az vm run-command` + `compose up` against the one host in parallel.
    # cancel-in-progress:false — never cancel a deploy mid-rollout; let it finish, then the next one runs.
    concurrency:
      group: argus-vm-rollout
      cancel-in-progress: false
    # TWO-LAYER GATE: `vars.ENABLE_DEPLOY` is the master kill-switch (off until the Azure sub + secrets exist),
    # and the `prod` GitHub Environment is the PER-RELEASE approval gate ("your allowance"): configure it
    # with required reviewers, so each tagged release PAUSES here for your manual approval before the root
    # run-command runs. Also set the OIDC federated subject to `repo:OWNER/REPO:environment:prod`
    # (var.github_deploy_subject in infra/azure/terraform) so the credential binds to the environment, not a branch.
    environment: prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build the run-command rollout script (bundles exact-SHA infra config)
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          KEY_VAULT: ${{ vars.KEY_VAULT_NAME }}
          GH_REPO: ${{ github.repository }} # owner/repo — the cosign signing identity the VM verifies against
          # The GHCR pull login username must be the account that OWNS the `argus-ghcr-token` PAT — NOT the
          # workflow actor (github.actor changes per tag-pusher and would mismatch the token owner). Defaults
          # to the repo owner; override with vars.GHCR_USER if the PAT belongs to a different/bot account.
          GHCR_USER: ${{ vars.GHCR_USER || github.repository_owner }}
          # Non-secret runtime config the api needs (invariant #5 allows these in env). compose.prod.yaml has
          # defaults for endpoint/region/bucket; the B2 access-key-ID has none, so the deploy MUST pass it or
          # attachments break. (The matching B2 SECRET key is a Key Vault file.)
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_REGION: ${{ vars.S3_REGION }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ vars.S3_ACCESS_KEY_ID }}
          # Non-secret keyId for the bucket-restricted B2 CORS app key (the SECRET half is argus-b2-cors-app-key
          # in Key Vault). Empty until provisioned → deploy.sh skips CORS convergence (opt-in).
          B2_CORS_KEY_ID: ${{ vars.B2_CORS_KEY_ID }}
          # age PUBLIC recipient key (age1...) for the nightly DB backup. Public (rides in deploy env like the
          # other non-secret config); the matching PRIVATE key stays in Key Vault, fetched only at restore.
          # REQUIRED — deploy.sh fails closed (won't arm the backup) without it.
          BACKUP_AGE_RECIPIENT: ${{ vars.BACKUP_AGE_RECIPIENT }}
          # Non-secret keyId for the db-backups B2 app key (the SECRET half is argus-b2-app-key in Key Vault).
          # A SEPARATE key from S3_ACCESS_KEY_ID (the attachment key) — the backup worker pairs this id with
          # the argus-b2-app-key secret. REQUIRED — deploy.sh fails closed without it.
          B2_APP_KEY_ID: ${{ vars.B2_APP_KEY_ID }}
          # Private db-backups bucket name — the nightly backup target, SEPARATE from the attachment S3_BUCKET.
          # REQUIRED — deploy.sh fails closed without it (and templates it into the unit per deploy so an
          # experiment can't write into the production backup bucket).
          BACKUP_S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
        run: |
          set -euo pipefail
          tar czf deploy-bundle.tgz compose.prod.yaml infra/stack/secrets infra/stack/deploy infra/stack/observability infra/stack/glitchtip infra/b2 infra/backup infra/cleanup infra/audit-prune infra/retention infra/notify
          B64="$(base64 -w0 deploy-bundle.tgz)"
          GHCR_REGISTRY="ghcr.io/$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')"
          # The script runs as root on the VM: unpack the bundle, then run deploy.sh with non-secret params.
          # `docker compose up` (a child of deploy.sh) inherits the exported S3_* and interpolates them.
          # The single-quoted echos below write LITERAL shell to runcmd.sh ($WORK expands on the VM, not here).
          # shellcheck disable=SC2016
          {
            echo 'set -euo pipefail'
            echo 'WORK="$(mktemp -d)"'
            printf "printf '%%s' '%s' | base64 -d | tar xz -C \"\$WORK\"\n" "$B64"
            printf 'export ARGUS_KEY_VAULT=%q IMAGE_TAG=%q GHCR_REGISTRY=%q GHCR_USER=%q GH_REPO=%q\n' \
              "$KEY_VAULT" "$IMAGE_TAG" "$GHCR_REGISTRY" "$GHCR_USER" "$GH_REPO"
            printf 'export S3_ENDPOINT=%q S3_REGION=%q S3_BUCKET=%q S3_ACCESS_KEY_ID=%q B2_CORS_KEY_ID=%q BACKUP_AGE_RECIPIENT=%q B2_APP_KEY_ID=%q BACKUP_S3_BUCKET=%q\n' \
              "$S3_ENDPOINT" "$S3_REGION" "$S3_BUCKET" "$S3_ACCESS_KEY_ID" "$B2_CORS_KEY_ID" "$BACKUP_AGE_RECIPIENT" "$B2_APP_KEY_ID" "$BACKUP_S3_BUCKET"
            echo 'bash "$WORK/infra/stack/deploy/deploy.sh"'
            echo 'rm -rf "$WORK"'
          } >runcmd.sh

      - name: Roll out via az vm run-command
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          VM: ${{ vars.AZURE_VM_NAME }}
        run: |
          set -euo pipefail
          # `az vm run-command invoke` exits 0 for the API call even if the in-VM script FAILED — so inspect
          # the captured output and require deploy.sh's final success sentinel (it only prints this as its last
          # line, after the rollout is healthy; any earlier `set -e` failure exits before it).
          out="$(az vm run-command invoke \
            --resource-group "$RG" --name "$VM" \
            --command-id RunShellScript --scripts @runcmd.sh -o json)"
          printf '%s\n' "$out" | jq -r '.value[].message'
          printf '%s\n' "$out" | jq -r '.value[].message' \
            | grep -q 'argus-deploy: deploy complete + healthy' || {
              echo '::error::VM rollout failed — deploy.sh did not reach the healthy-complete sentinel'
              exit 1
            }
