name: cd

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'compose.prod.yaml'
      - 'infra/vm/**'
      - '.github/workflows/cd.yml'

# Least privilege. id-token: Azure OIDC (no stored cloud creds) + cosign keyless signing.
# packages: write to push the images to GHCR. No contents:write (the VM rollout is run-command, not GitOps).
permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }} # github.sha is trusted (not attacker-controllable)

jobs:
  # Build, scan, SBOM, and keyless-sign both images (api + the Caddy ingress that bakes the PWA), push to GHCR.
  images:
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: api
            context: apps/api
            dockerfile: apps/api/Dockerfile
          - name: ingress
            context: .
            dockerfile: infra/vm/caddy/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Resolve image ref (lowercase owner — GHCR requires it)
        env:
          OWNER: ${{ github.repository_owner }}
          NAME: ${{ matrix.name }}
        run: echo "IMAGE=${REGISTRY}/$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')/argus-${NAME}:${IMAGE_TAG}" >>"$GITHUB_ENV"

      - name: GHCR login
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.IMAGE }}
          # The PWA's OIDC config is build-time (Vite VITE_*); empty for the api. Repo vars, non-secret.
          build-args: |
            VITE_OIDC_ISSUER=${{ vars.VITE_OIDC_ISSUER }}
            VITE_OIDC_CLIENT_ID=${{ vars.VITE_OIDC_CLIENT_ID }}
            VITE_OIDC_REDIRECT_URI=${{ vars.VITE_OIDC_REDIRECT_URI }}

      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.IMAGE }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image + attest SBOM (keyless via OIDC)
        run: |
          cosign sign --yes "$IMAGE"
          cosign attest --yes --predicate "sbom-${{ matrix.name }}.spdx.json" --type spdxjson "$IMAGE"

  # Roll out to the single VM through the Azure control plane (no SSH, no open port). Gated; runs only after
  # both images are built + signed. The exact-SHA infra files are bundled INTO the run-command, so the VM
  # token stays pull-only (it can't read the repo). The VM pulls the signed images + migrates before serving.
  deploy:
    needs: images
    if: ${{ vars.ENABLE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    # Bind to a protected GitHub Environment: before arming, configure `production` with required reviewers and
    # set the OIDC federated subject to `repo:OWNER/REPO:environment:production` (var.github_deploy_subject in
    # infra/vm/terraform) so a push to main can't trigger a root run-command without the env's approval gate.
    environment: production
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build the run-command rollout script (bundles exact-SHA infra config)
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          KEY_VAULT: ${{ vars.KEY_VAULT_NAME }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -euo pipefail
          tar czf deploy-bundle.tgz compose.prod.yaml infra/vm/secrets infra/vm/deploy
          B64="$(base64 -w0 deploy-bundle.tgz)"
          GHCR_REGISTRY="ghcr.io/$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')"
          # The script runs as root on the VM: unpack the bundle, then run deploy.sh with non-secret params.
          # The single-quoted echos below write LITERAL shell to runcmd.sh ($WORK expands on the VM, not here).
          # shellcheck disable=SC2016
          {
            echo 'set -euo pipefail'
            echo 'WORK="$(mktemp -d)"'
            printf "printf '%%s' '%s' | base64 -d | tar xz -C \"\$WORK\"\n" "$B64"
            printf 'export ARGUS_KEY_VAULT=%q IMAGE_TAG=%q GHCR_REGISTRY=%q GHCR_USER=%q\n' \
              "$KEY_VAULT" "$IMAGE_TAG" "$GHCR_REGISTRY" "$GHCR_USER"
            echo 'bash "$WORK/infra/vm/deploy/deploy.sh"'
            echo 'rm -rf "$WORK"'
          } >runcmd.sh

      - name: Roll out via az vm run-command
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          VM: ${{ vars.AZURE_VM_NAME }}
        run: |
          az vm run-command invoke \
            --resource-group "$RG" --name "$VM" \
            --command-id RunShellScript --scripts @runcmd.sh
