# Local pre-commit / pre-push gates (Layer 2). Run `pnpm prepare` once to install.
pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks protect --staged --redact --no-banner
    eslint:
      glob: '*.{ts,tsx}'
      run: pnpm exec eslint {staged_files}
    prettier:
      glob: '*.{ts,tsx,json,md,yml,yaml}'
      run: pnpm exec prettier --check {staged_files}
    semgrep:
      glob: '*.{ts,tsx}'
      run: .venv/bin/semgrep --error --quiet --config .semgrep {staged_files}

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm -r typecheck
    test:
      # Serialize the workspace suites: crypto + web both run heavy Argon2id, and running all four suites'
      # worker pools at once oversubscribes the CPU → web's keystore tests flake on the default timeout.
      # Sequential is as fast here (no thrashing) and deterministic.
      run: pnpm -r --workspace-concurrency=1 test
