name: argus-prod

# Production stack for the single Azure VM (germanywestcentral). STANDALONE — run it on its own, NOT layered
# over compose.yaml (which is local-dev only and carries throwaway creds + MinIO + dev source mounts):
#   docker compose -f compose.prod.yaml up -d
#
# Topology (see docs/threat-models/vm-ingress.md):
#   users ─HTTPS─▶ Cloudflare edge (TLS + WAF + rate-limit) ─tunnel─▶ cloudflared ─▶ caddy:8080
#                  caddy serves the PWA + proxies /api,/ws → api:3000
#   api ─▶ postgres / redis (internal Docker network, NO published ports) ; api ─▶ Backblaze B2 (egress)
#
# Hardening invariants baked in here:
#   - NO published host ports on ANY service. cloudflared is outbound-only; everything else is reachable
#     only on the internal Docker network. The only way in is the authenticated Cloudflare tunnel.
#   - non-root + no-new-privileges + cap_drop:[ALL] where the image allows; resource limits on every service.
#
# SECRETS (invariant #5): no secret VALUES live in this file. Data-plane secrets are mounted credential
# FILES (Docker secrets at /run/secrets/*): the Postgres password (POSTGRES_PASSWORD_FILE), the api's
# password-bearing connection URL (DATABASE_URL_FILE), and the B2 secret key (S3_SECRET_ACCESS_KEY_FILE).
# The cloudflared TUNNEL_TOKEN is the one credential delivered as a runtime-fetched value (the image has no
# shell / no --token-file), injected from the deploy environment — never a committed env file. Slice 3
# populates all of these from Key Vault via the VM's Managed Identity (systemd); see docs/roadmap.md Phase 0
# #8, docs/deploy.md, and .env.prod.example.
# Self-hosted Zitadel (roadmap checkpoint 9, Phase 1) lives in this stack: zitadel + its own Postgres
# (zitadel-db) + the Login V2 UI (zitadel-login), reachable at https://auth.4rgus.com (public OIDC issuer —
# end users authenticate against it; Caddy host-splits that domain to Zitadel, the rest to the app). TLS
# terminates at Cloudflare; Zitadel runs ExternalSecure=true + --tlsMode external behind it. Its masterkey and
# DB password come from Key Vault (masterkey as a Docker secret FILE via --masterkeyFile; the DB password as a
# file for postgres + a runtime value for Zitadel, the same TUNNEL_TOKEN-style exception). The bootstrap admin
# password is a first-init-only runtime value (change-required). See docs/threat-models/vm-zitadel.md +
# docs/deploy.md "Zitadel bootstrap". Provisioning (project/app/tenant-claim Action) + the multi-tenant
# org->tenant_id mapping are the deferred G1 follow-on; #9 stands up the instance + DB + reachable console.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Bootstrap OWNER account (init + migrations). The API does NOT connect as this role — it uses the
    # non-bypass runtime role argus_app (see the api service's DATABASE_URL_FILE). Password from a mounted
    # credential file, never inline/env (invariant #5).
    environment:
      POSTGRES_USER: argus
      POSTGRES_DB: argus
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No published ports — reachable only by the api on the internal network.
    security_opt:
      - no-new-privileges:true
    # Drop all caps, then add back only what the alpine postgres entrypoint needs to chown the data dir and
    # drop privileges to the `postgres` user (a bare `cap_drop: [ALL]` breaks initdb). Read-only root FS is
    # impractical for Postgres (socket + temp writes) — documented residual in vm-ingress.md.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argus -d argus']
      interval: 10s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    # AUTH via a generated CONFIG FILE (`requirepass` from Key Vault) — never a `--requirepass` CLI arg, which
    # would leak the password into the process list / /proc/<pid>/cmdline. deploy.sh writes redis.conf
    # (save "" / appendonly no / requirepass <pw>) to the tmpfs secrets dir; mounted here as a Docker secret.
    # Persistence stays off (cache/pubsub only). Internal network, no published port (defense-in-depth AUTH).
    command: ['redis-server', '/run/secrets/redis_conf']
    secrets:
      - redis_conf
      - redis_password # the healthcheck reads it (below) — NOT in env (would expose via `docker inspect`)
    read_only: true # persistence is off, so nothing durable is written
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      # Authenticate via REDISCLI_AUTH read from the mounted secret FILE at check time (`$$` escapes Compose
      # interpolation → a literal `$` for the container shell) — never an `-a` argv flag (process-list leak) and
      # never a persistent env var (would land in the container's at-rest config; invariant #5). `-e` makes
      # redis-cli exit NON-zero on an error reply (NOAUTH / WRONGPASS) — a plain `ping` exits 0 even when auth
      # fails, which would falsely report a misconfigured-AUTH redis as healthy.
      test: ['CMD-SHELL', 'REDISCLI_AUTH="$$(cat /run/secrets/redis_password)" redis-cli -e ping']
      interval: 10s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  api:
    # Image is built + scanned + signed by cd.yml and pulled by tag here (CD sets ARGUS_API_IMAGE to the
    # registry digest/tag). No build stanza in prod — the VM pulls a known-good image, it does not build.
    # The API also listens on :9090 (METRICS_PORT) for the Prometheus scrape (checkpoint 47). NO published
    # port for it — /metrics is UNAUTHENTICATED by design and its entire authz story is "internal network
    # only": never add a `9090:` host-port mapping here, and never route it through Caddy. Prometheus (Slice B)
    # scrapes api:9090 over the internal network. See docs/threat-models/observability.md.
    image: ${ARGUS_API_IMAGE:-argus-api:local}
    restart: unless-stopped
    environment:
      NODE_ENV: production # no Swagger UI in prod
      PORT: '3000'
      # --- Non-secret config (invariant #5 allows these in env) ---
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.eu-central-003.backblazeb2.com}
      S3_REGION: ${S3_REGION:-eu-central-003}
      S3_BUCKET: ${S3_BUCKET:-argus-attachments}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-} # non-secret B2 key id — set per .env.prod.example
      S3_FORCE_PATH_STYLE: 'false' # B2 uses virtual-host style
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      # Error tracking (#48 Slice B) — DSN-GATED: SENTRY_DSN_FILE unset/empty = a complete no-op.
      # The DSN is delivered as a mounted file (sentry_dsn Docker secret, sourced from Key Vault as
      # argus-sentry-dsn). The fetch script seeds an EMPTY file on first boot; the api stays disabled
      # until the operator provisions the DSN in Key Vault after the GlitchTip UI is up (see .env.prod.example).
      # Events are default-deny scrubbed before send (docs/threat-models/error-tracking.md).
      SENTRY_DSN_FILE: /run/secrets/sentry_dsn
      SENTRY_RELEASE: ${IMAGE_TAG:-}
      # --- Secrets are delivered as FILES, never env (invariant #5) ---
      # The app reads the password-bearing connection URLs and the B2 secret key from mounted credential
      # files (Docker secrets at /run/secrets/*), never env. On the VM these are systemd-delivered from Key
      # Vault via the Managed Identity (Slice 3). REDIS_URL_FILE carries the redis password (redis requires
      # AUTH) — deploy.sh generates `redis://:<pw>@redis:6379` from the Key Vault redis_password into a tmpfs
      # secret file; the app reads it via REDIS_URL_FILE (ioredis parses the URL). Keeping it in a file (not
      # REDIS_URL env) keeps the password out of `docker inspect` / the daemon's at-rest container config.
      # database_url MUST be the non-bypass RUNTIME role argus_app (not the argus owner) — least privilege so
      # RLS/grants bind even off the SET-LOCAL-ROLE path. See .env.prod.example + docs/deploy.md.
      DATABASE_URL_FILE: /run/secrets/database_url
      S3_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_secret_access_key
      REDIS_URL_FILE: /run/secrets/redis_url
    secrets:
      - database_url
      - s3_secret_access_key
      - redis_url
      - sentry_dsn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/healthz || exit 1']
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  caddy:
    # Single-origin router: serves the PWA static build (baked in) + proxies /api,/ws to the api.
    # Built from the repo root by cd.yml and pulled by tag; the build stanza lets you build it locally too.
    image: ${ARGUS_INGRESS_IMAGE:-argus-ingress:local}
    build:
      context: .
      dockerfile: infra/vm/caddy/Dockerfile
      # OIDC is baked into the PWA at build time (Vite VITE_*). Empty until Zitadel-on-VM (roadmap #9);
      # CD passes the real values so the shipped client does real auth, not demo mode.
      args:
        VITE_OIDC_ISSUER: ${VITE_OIDC_ISSUER:-}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-}
        VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-}
    restart: unless-stopped
    # No published ports — cloudflared reaches caddy:8080 on the internal network.
    # Redirect Caddy's storage/autosave to the writable /tmp tmpfs so the read-only root FS doesn't break
    # startup (Caddy writes $XDG_DATA_HOME/caddy + $XDG_CONFIG_HOME/caddy even with admin/auto_https off).
    environment:
      HOME: /tmp
      XDG_DATA_HOME: /tmp/caddy-data
      XDG_CONFIG_HOME: /tmp/caddy-config
    depends_on:
      api:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  cloudflared:
    # Outbound tunnel to the Cloudflare edge — the ONLY ingress. No published ports. Ingress hostnames
    # (4rgus.com → http://caddy:8080, admin.* behind Cloudflare Access) are dashboard-managed (token tunnel).
    # Pin: verify/refresh the tag before first deploy (Dependabot tracks it). cloudflared is date-versioned.
    image: cloudflare/cloudflared:2025.6.1
    restart: unless-stopped
    command: ['tunnel', '--no-autoupdate', 'run']
    # TUNNEL_TOKEN is the one secret that can't be a mounted file: the cloudflared image has no shell and no
    # `--token-file` flag (only `--token` / `$TUNNEL_TOKEN`). Invariant #5 permits a "runtime-fetched value"
    # as well as a file, so it's injected from the deploy environment — NOT from a committed/on-disk env file.
    # The stack launcher sets it from the Slice-3 credential file:
    #   export TUNNEL_TOKEN="$(cat /run/argus/secrets/tunnel_token)"   # delivered by argus-secrets.service
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      caddy:
        condition: service_started
    read_only: true # static Go binary; nothing durable to write
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # --- Self-hosted identity provider (roadmap #9) -------------------------------------------------------
  # Dedicated Postgres for Zitadel — its OWN cluster + volume, isolated from the argus app DB (separate
  # container, separate credentials, no shared role). No published port: reachable only by `zitadel` on the
  # internal network. Owner password from a mounted credential file, never inline/env (invariant #5).
  zitadel-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_DB: zitadel
      POSTGRES_PASSWORD_FILE: /run/secrets/zitadel_db_password
    secrets:
      - zitadel_db_password
    volumes:
      - zitadel-pgdata:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    # Same cap set as the app postgres: a bare cap_drop:[ALL] breaks initdb (it needs to chown the data dir
    # and drop to the postgres user). Read-only root FS is impractical for Postgres (socket + temp writes).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zitadel -d zitadel']
      interval: 10s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '1.0'

  # Zitadel identity server — OIDC/OAuth/JWKS + the admin console. Public issuer at https://auth.4rgus.com
  # (Caddy host-splits that domain here). TLS terminates at Cloudflare, so it serves plain HTTP internally with
  # --tlsMode external + ExternalSecure=true (emits https:// issuer URLs). FirstInstance config is env-only (no
  # committed steps file): it creates the org, the Login V2 service-user machine account, and a bootstrap
  # human admin whose password is a FIRST-INIT-ONLY runtime value (change-required), ignored on later boots.
  # The login service-user PAT is NOT persisted to a volume (invariant #2) — it's delivered from Key Vault as
  # a credential file (see zitadel-login). FirstInstance writes its first-boot PAT to the container-local
  # tmpfs (/tmp) only, for the operator to read once during arming and store in Key Vault.
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.0
    restart: unless-stopped
    command:
      [
        'start-from-init',
        '--masterkeyFile',
        '/run/secrets/zitadel_masterkey',
        '--tlsMode',
        'external',
      ]
    environment:
      ZITADEL_PORT: '8080'
      ZITADEL_EXTERNALDOMAIN: auth.4rgus.com
      ZITADEL_EXTERNALPORT: '443'
      ZITADEL_EXTERNALSECURE: 'true'
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: '5432'
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel_user
      # The DB password has no Zitadel `_FILE` env form, so it's a runtime value from the Key Vault file (the
      # same accepted exception as cloudflared's TUNNEL_TOKEN — never a committed/on-disk env file). The
      # MOST sensitive secret, the masterkey, IS a file (--masterkeyFile above). See vm-zitadel.md §4.
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:-}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD:-}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # Wire Login V2 at FIRST BOOT (the DEFAULTINSTANCE_* keys only apply during init) so the fresh instance's
      # console + auth use the /ui/v2/login app immediately — without this the instance comes up with no working
      # login URL and you can't even reach the console to provision it (chicken-and-egg). The OIDC/SAML default
      # URLs are runtime config (every boot). Values mirror Zitadel's canonical v4.15 Compose for an external
      # https domain. These replace the post-boot `loginV2.baseUri` API call the local provisioner makes.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: 'true'
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://auth.4rgus.com/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://auth.4rgus.com/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://auth.4rgus.com/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://auth.4rgus.com/ui/v2/login/login?samlRequest=
      # FirstInstance (env-only) — runs once on the very first init, skipped on every later boot.
      ZITADEL_FIRSTINSTANCE_ORG_NAME: argus
      # First-boot PAT lands in the container-local tmpfs (NOT a shared/persisted volume). The operator copies
      # it out once during arming (host-side `docker cp`, since this image has no shell — see docs/deploy.md)
      # and stores it in Key Vault as argus-zitadel-login-pat; thereafter it's delivered as a credential file.
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /tmp/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: '2099-12-31T23:59:59Z'
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: Argus
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: admin@4rgus.com
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: 'true'
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: 'true'
      # First-init only — bootstrap admin password from Key Vault (deploy.sh exports it on `up`). Change it +
      # enable MFA immediately after first login; ignored once the instance exists. See docs/deploy.md.
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-}
    secrets:
      - zitadel_masterkey
    depends_on:
      zitadel-db:
        condition: service_healthy
    read_only: true # stateless (state lives in zitadel-db); only the /tmp tmpfs is writable
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The Zitadel binary ships its own readiness probe (`zitadel ready` — verifies the instance + endpoints,
    # not just "process up"), so the deploy can gate on real readiness even though the image has no /bin/sh.
    # Values mirror the canonical v4.15 Compose. start_period covers the cold first-init schema migration.
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '1.0'

  # Zitadel v4 hosted Login V2 UI — a separate app from the identity server. The main `zitadel` container
  # serves OIDC/API/JWKS/console; this renders the browser login screens at /ui/v2/login (Caddy routes that
  # path here). It authenticates to the Zitadel API with the Login V2 service-user PAT, delivered from Key
  # Vault as a credential file (see ZITADEL_SERVICE_USER_TOKEN_FILE below). The instance's Login V2 base URI is
  # wired at first boot by the zitadel service's ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI env (above).
  # NEXT_PUBLIC_BASE_PATH tells the Next.js app it's mounted under /ui/v2/login (Caddy forwards that prefix
  # unchanged) — without it the prefixed routes/assets 404 even though the container stays up. CUSTOM_REQUEST_HEADERS
  # makes its server-side calls to the Zitadel API carry the real external Host + scheme behind the TLS-terminating
  # proxy. Both mirror Zitadel's canonical v4.15 Compose example (zitadel/zitadel deploy/compose).
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:v4.15.0
    restart: unless-stopped
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      CUSTOM_REQUEST_HEADERS: Host:auth.4rgus.com,X-Forwarded-Proto:https
      # The Login V2 service-user PAT is a Key-Vault-delivered credential FILE (Docker secret on /run tmpfs),
      # never a persisted volume (invariant #2). First boot: the file is empty until the operator seeds the
      # PAT into Key Vault during arming (see docs/deploy.md) — login is degraded until then, which folds into
      # the same provisioning step. On every later boot argus-secrets.service re-delivers it (reboot-safe).
      ZITADEL_SERVICE_USER_TOKEN_FILE: /run/secrets/zitadel_login_pat
    secrets:
      - zitadel_login_pat
    depends_on:
      # Wait for the API to be READY (not just started) so the login app can reach it on first boot.
      zitadel:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The login image bundles a Node readiness script + a shell; probe its own /ui/v2/login/healthy endpoint
    # (under the configured base path). Mirrors the canonical v4.15 Compose healthcheck.
    healthcheck:
      test:
        [
          'CMD',
          '/bin/sh',
          '-c',
          'node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy',
        ]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # --- Observability (roadmap #47, Slice B) -------------------------------------------------------------
  # Prometheus scrapes the API's content-blind metrics (api:9090) over the internal network; Grafana
  # visualises them (behind Cloudflare Access on grafana.4rgus.com); Alertmanager routes alerts. Pin images
  # (Dependabot-tracked); verify tags before first deploy. Config files are bind-mounted read-only from the
  # repo tree deploy.sh stages into /opt/argus. NO published ports — only Grafana is reachable, via Caddy +
  # Access. Threat model: docs/threat-models/observability.md.
  prometheus:
    image: prom/prometheus:v3.6.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./infra/vm/observability/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus # named volume inherits the image's nobody:nobody ownership on first init
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '0.75'

  alertmanager:
    image: prom/alertmanager:v0.29.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./infra/vm/observability/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # Grafana — the ONLY observability service with ingress (Caddy host-splits grafana.4rgus.com here, behind
  # Cloudflare Access). Admin password is a Key-Vault credential FILE via Grafana's native `__FILE` support
  # (invariant #5 — never an env value at rest). Anonymous + sign-up disabled; phone-home off.
  grafana:
    image: grafana/grafana:12.1.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: https://grafana.4rgus.com
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
    secrets:
      - grafana_admin_password
    volumes:
      - ./infra/vm/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/vm/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana # inherits the image's grafana-user ownership on first init
    depends_on:
      prometheus:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # Loki — centralized log store (roadmap #47b). INTERNAL ONLY (no published port, no auth — same posture as
  # Prometheus), queried by Grafana over the internal network. Non-root (image default uid 10001), read-only
  # FS + tmpfs, filesystem storage on a named volume; 7-day retention. Verify/refresh the image tag at arming.
  # Threat model: docs/threat-models/centralized-logs.md.
  loki:
    image: grafana/loki:3.5.0
    restart: unless-stopped
    command: ['-config.file=/etc/loki/loki-config.yml']
    volumes:
      - ./infra/vm/observability/loki:/etc/loki:ro
      - loki-data:/loki # named volume inherits the image's loki-user (10001) ownership on first init
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # Grafana Alloy — log COLLECTOR (roadmap #47b). Tails container json logs from a READ-ONLY mount of
  # /var/lib/docker/containers — NO Docker socket (a socket mount is daemon-root-equivalent). Runs as uid 0
  # ONLY to read the root:root 0640 logs; cap_drop:[ALL] + read-only rootfs + the read-only log mount + no
  # socket bound it (it can read logs and nothing more). Pushes to Loki over the internal network; no published
  # port. The config scrubs secret-shaped values as defense-in-depth. See docs/threat-models/centralized-logs.md.
  alloy:
    image: grafana/alloy:v1.16.3
    restart: unless-stopped
    command:
      - 'run'
      - '--storage.path=/var/lib/alloy/data'
      - '/etc/alloy/config.alloy'
    user: '0:0' # required to read root-owned /var/lib/docker/containers/*-json.log (read-only mount; no socket)
    volumes:
      - ./infra/vm/observability/alloy:/etc/alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro # host container logs, READ-ONLY; never the socket
      - alloy-data:/var/lib/alloy/data # read offsets/WAL — avoids re-ingesting on restart
    depends_on:
      loki:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # ─── GlitchTip — self-hosted error tracking (#48 Slice B) ────────────────────────────────────────────────
  # Sentry-API-compatible, EU data residency, no new sub-processor. Three components:
  #   glitchtip-db   — dedicated Postgres (same isolation pattern as zitadel-db)
  #   glitchtip      — Django web + gunicorn (runs migrate on startup, then serves the API + UI on :8000)
  #   glitchtip-worker — Celery worker + beat (async event ingest, cleanup, notifications)
  # ONLY glitchtip is exposed at https://glitchtip.4rgus.com via Caddy (host-split), gated by Cloudflare
  # Access + GlitchTip's own auth. glitchtip-db never has a published port.
  # GlitchTip (Django) has no `_FILE` env support — secrets are read from files via the entrypoint wrapper.
  # DSN is provisioned post-arming (OPTIONAL secret argus-sentry-dsn); api is a no-op until then.
  # See docs/threat-models/error-tracking.md.

  glitchtip-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_DB: glitchtip
      POSTGRES_PASSWORD_FILE: /run/secrets/glitchtip_db_password
    secrets:
      - glitchtip_db_password
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    # initdb needs CHOWN/SETUID/SETGID/DAC_OVERRIDE/FOWNER to set up the data dir — same cap set as zitadel-db.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U glitchtip -d glitchtip']
      interval: 10s
      timeout: 3s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  glitchtip:
    image: glitchtip/glitchtip:v4
    restart: unless-stopped
    # The entrypoint wrapper reads the three secret files into env (DATABASE_URL, SECRET_KEY, REDIS_URL)
    # before exec-ing the original command. The wrapper is bind-mounted read-only from the staged repo tree.
    entrypoint: /entrypoint.sh
    # run-migrate-and-web.sh: runs `manage.py migrate --run-syncdb` then starts gunicorn on :8000.
    # Migrations run on EVERY container start (idempotent) — no separate migrate service needed.
    command: ./bin/run-migrate-and-web.sh
    depends_on:
      glitchtip-db:
        condition: service_healthy
    environment:
      # Non-secret config. GLITCHTIP_DOMAIN must match the public URL for correct absolute link generation.
      GLITCHTIP_DOMAIN: https://glitchtip.4rgus.com
      DEFAULT_FROM_EMAIL: noreply@4rgus.com
      # consolemail: logs emails to stdout — no SMTP required. Configure SMTP as a follow-up if desired.
      EMAIL_URL: consolemail://
      # Disable self-registration: only operators (who have the Cloudflare Access identity) can sign in.
      GLITCHTIP_DISABLE_REGISTRATION: 'True'
      # Retain events for 90 days (matches audit log retention in roadmap #16).
      GLITCHTIP_MAX_EVENT_LIFE_DAYS: '90'
      # Single worker is enough for current event volume (single VM). Increase if ingestion is slow.
      CELERY_WORKER_CONCURRENCY: '1'
      # DATABASE_URL, SECRET_KEY, REDIS_URL are NOT set here — injected by /entrypoint.sh from secret files.
    secrets:
      - glitchtip_database_url
      - glitchtip_secret_key
      - redis_url
    volumes:
      - ./infra/vm/glitchtip/docker-entrypoint.sh:/entrypoint.sh:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8000/api/0/version/ || exit 1']
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.75'

  glitchtip-worker:
    image: glitchtip/glitchtip:v4
    restart: unless-stopped
    entrypoint: /entrypoint.sh
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      glitchtip:
        condition: service_healthy
    environment:
      GLITCHTIP_DOMAIN: https://glitchtip.4rgus.com
      DEFAULT_FROM_EMAIL: noreply@4rgus.com
      EMAIL_URL: consolemail://
      GLITCHTIP_DISABLE_REGISTRATION: 'True'
      GLITCHTIP_MAX_EVENT_LIFE_DAYS: '90'
      CELERY_WORKER_CONCURRENCY: '1'
    secrets:
      - glitchtip_database_url
      - glitchtip_secret_key
      - redis_url
    volumes:
      - ./infra/vm/glitchtip/docker-entrypoint.sh:/entrypoint.sh:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

secrets:
  # Sourced from ${ARGUS_SECRETS_DIR} — local dev uses the gitignored ./secrets; prod points it at the tmpfs
  # dir that argus-secrets.service fills from Key Vault via the Managed Identity (Slice 3:
  # ARGUS_SECRETS_DIR=/run/argus/secrets). Either way the values are credential FILES, never committed/env.
  # NOTE: the on-disk files are root-owned mode 0444 (NOT 0400). File-based Compose secrets are bind-mounted
  # into the container with the host owner/mode UNCHANGED on Linux — there is NO uid/gid remapping (that only
  # happens on macOS Docker Desktop's file-sharing layer, which is why a Mac test of 0400 misleadingly passes).
  # Our services run NON-root (api/node uid 1000, postgres uid 999, grafana uid 472, redis uid 999), so a
  # root-owned 0400 file would be unreadable and the stack would fail to start on the real VM. 0444 lets the
  # container user read it; confinement is the 0700 root tmpfs SECRETS_DIR (host non-root users can't traverse
  # it; the root daemon mounts the file in), NOT the file mode. Set by fetch-keyvault-secrets.sh / deploy.sh.
  postgres_password:
    file: ${ARGUS_SECRETS_DIR:-./secrets}/postgres_password
  database_url:
    # Full password-bearing connection URL (argus_app role); the api reads it via DATABASE_URL_FILE.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/database_url
  s3_secret_access_key:
    # B2 application-key secret; the api reads it via S3_SECRET_ACCESS_KEY_FILE.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/s3_secret_access_key
  redis_conf:
    # redis.conf GENERATED by deploy.sh from the Key Vault redis_password (save "" / appendonly no /
    # requirepass <pw>). redis runs `redis-server /run/secrets/redis_conf` — config-file AUTH, never argv.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/redis.conf
  redis_password:
    # Raw Key Vault redis_password (argus-redis-password). Mounted into redis so the healthcheck can read
    # REDISCLI_AUTH from a file — never an env var (invariant #5; would surface via `docker inspect`).
    file: ${ARGUS_SECRETS_DIR:-./secrets}/redis_password
  redis_url:
    # redis://:<pw>@redis:6379 GENERATED by deploy.sh from the Key Vault redis_password; the api reads it via
    # REDIS_URL_FILE (ioredis). A FILE, not REDIS_URL env, so the password never lands in container config.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/redis_url
  zitadel_masterkey:
    # 32-byte Zitadel masterkey (encrypts the keys Zitadel stores in its DB). Generate ONCE, never rotate
    # casually — loss makes the instance unrecoverable. Zitadel reads it via --masterkeyFile.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/zitadel_masterkey
  zitadel_db_password:
    # zitadel-db owner password (postgres reads it via POSTGRES_PASSWORD_FILE; Zitadel reads the same value
    # as a runtime env, ${ZITADEL_DB_PASSWORD}, since it has no `_FILE` env form).
    file: ${ARGUS_SECRETS_DIR:-./secrets}/zitadel_db_password
  zitadel_login_pat:
    # Login V2 service-user PAT — zitadel-login reads it via ZITADEL_SERVICE_USER_TOKEN_FILE. Delivered from
    # Key Vault (argus-zitadel-login-pat); the fetch script seeds an EMPTY file on first boot (before it's
    # provisioned) so the mount always resolves — login is degraded until the operator stores the real PAT.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/zitadel_login_pat
  grafana_admin_password:
    # Grafana admin password — Grafana reads it via GF_SECURITY_ADMIN_PASSWORD__FILE (native `__FILE` support).
    # Delivered from Key Vault (argus-grafana-admin-password); set it before the first deploy.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/grafana_admin_password
  glitchtip_db_password:
    # GlitchTip Postgres owner password — glitchtip-db reads it via POSTGRES_PASSWORD_FILE.
    # deploy.sh derives glitchtip_database_url from it (same pattern as redis_url). Set before first deploy.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/glitchtip_db_password
  glitchtip_database_url:
    # Full GlitchTip DSN: postgresql://glitchtip:<pw>@glitchtip-db:5432/glitchtip.
    # GENERATED by deploy.sh from glitchtip_db_password (never stored in Key Vault directly).
    file: ${ARGUS_SECRETS_DIR:-./secrets}/glitchtip_database_url
  glitchtip_secret_key:
    # Django SECRET_KEY (cryptographic). Generate: python -c "import secrets; print(secrets.token_urlsafe(50))"
    # Stored in Key Vault as argus-glitchtip-secret-key. Set before first deploy.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/glitchtip_secret_key
  sentry_dsn:
    # GlitchTip project DSN — a write-only ingest key for the api's @sentry/node SDK (roadmap #48).
    # OPTIONAL: fetched from Key Vault (argus-sentry-dsn); seeded EMPTY on first boot so the mount
    # resolves (api is a no-op until provisioned). Operator provisions AFTER the GlitchTip UI is live.
    file: ${ARGUS_SECRETS_DIR:-./secrets}/sentry_dsn

volumes:
  pgdata:
  # Zitadel's own Postgres data — separate cluster from the argus app DB (pgdata).
  zitadel-pgdata:
  # Observability state (roadmap #47): Prometheus TSDB, Grafana DB, Alertmanager silences/notification state.
  prometheus-data:
  grafana-data:
  alertmanager-data:
  # Centralized logs (roadmap #47b): Loki chunks/index, Alloy read offsets/WAL.
  loki-data:
  alloy-data:
  # GlitchTip dedicated Postgres data (roadmap #48 Slice B) — separate cluster from the app DB.
  glitchtip-db-data:
