# Checkov config for the single-VM deploy. Suppressions live as resource-scoped inline
# `# checkov:skip=` comments in the Terraform (infra/vm/), not here — see the note below.
directory:
  - .
framework:
  - terraform
  - dockerfile
  - github_actions
quiet: true
compact: true
# No global skip-check: the single-VM (infra/vm) suppressions are RESOURCE-SCOPED via inline
# `# checkov:skip=` comments on the specific resources, so they can't silently hide the same finding
# elsewhere. Any new misconfiguration fails CI.
