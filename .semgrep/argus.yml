rules:
  - id: argus-no-insecure-random
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Insecure randomness. Math.random() and Node's pseudoRandomBytes are NOT CSPRNGs and must never
      seed keys, nonces, salts, IVs, IDs, or tokens. Use crypto.getRandomValues / crypto.randomUUID
      (WebCrypto), gen_random_uuid() in SQL, or the primitives in packages/crypto. Banned in tests too —
      use crypto-grade randomness there as well.
    # No path excludes: a total ban. The bare `Math.random` pattern (not `Math.random()`) also catches
    # aliasing like `const r = Math.random; r()`, which a call-only pattern would miss.
    patterns:
      - pattern-either:
          - pattern: Math.random
          - pattern: crypto.pseudoRandomBytes(...)
          - pattern: pseudoRandomBytes(...)

  - id: argus-crypto-only-in-crypto-package
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Cryptographic primitives must live in packages/crypto and go through the MLS wrapper.
      Hand-rolled crypto elsewhere is forbidden.
    paths:
      exclude: ['packages/crypto/**', '**/*.spec.ts', '**/*.test.ts']
    patterns:
      - pattern-regex: \b(crypto\.subtle|createCipheriv|createDecipheriv|createHmac|pbkdf2Sync?|scryptSync?|tweetnacl|libsodium)\b

  - id: argus-no-vetted-crypto-libs-outside-boundary
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Protocol crypto libraries (@noble/curves, @hpke/*) belong only in packages/crypto (the MLS wrapper).
      Building protocol crypto from raw primitives elsewhere — including in apps/api/src/auth — is forbidden;
      route it through packages/crypto. (The ONLY auth exception is @noble/hashes Argon2id, governed by the
      separate argus-argon2id-only-in-auth rule.)
    # Deliberately NOT excluding apps/api/src/auth: only @noble/hashes (Argon2id) is sanctioned there, so a
    # stray @noble/curves or @hpke import in an auth file must still trip this guard.
    paths:
      exclude: ['packages/crypto/**', '**/*.spec.ts', '**/*.test.ts']
    patterns:
      - pattern-regex: from\s+['"](@hpke/|@noble/curves)

  - id: argus-argon2id-only-in-auth
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      @noble/hashes (Argon2id) is a pre-cleared invariant-#4 exception allowed ONLY in apps/api/src/auth (the
      breakglass admin-password hash; see docs/threat-models/breakglass-admin.md) and packages/crypto. Anywhere
      else it is hand-rolled crypto — forbidden.
    paths:
      exclude: ['packages/crypto/**', 'apps/api/src/auth/**', '**/*.spec.ts', '**/*.test.ts']
    patterns:
      - pattern-regex: from\s+['"]@noble/hashes

  - id: argus-no-secret-logging
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Do not log secrets, keys, tokens, or message content. Logs carry IDs and metadata only.
    paths:
      exclude: ['**/*.spec.ts', '**/*.test.ts']
    patterns:
      - pattern-regex: (console\.(log|info|warn|error|debug)|logger\.(log|info|warn|error|debug|verbose))\s*\([^)]*\b(password|passphrase|private[_]?[Kk]ey|secret|bearer|authorization|ciphertext|plaintext|sessionKey|messageKey)\b

  - id: argus-no-sql-string-interpolation
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Possible SQL injection — use parameterized queries, never template-string interpolation
      into SQL. Also confirm the query runs under the tenant RLS context.
    pattern-regex: (SELECT|INSERT\s+INTO|UPDATE|DELETE\s+FROM)\b[^;`]*\$\{

  - id: argus-no-hardcoded-secret
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Hardcoded secret-looking value. Secrets come from Key Vault via Workload ID, never source.
    paths:
      exclude: ['**/*.spec.ts', '**/*.test.ts']
    pattern-regex: (?i)(api[_-]?key|secret|password|token)\s*[:=]\s*['"][A-Za-z0-9_\-]{16,}['"]
